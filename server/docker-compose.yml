version: '3.8'
services:
  mosquitto:
    image: eclipse-mosquitto:2.0
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro

  alerta-mock:
    build: .
    command: node alerta_mock.js
    ports:
      - "8080:8080"
    depends_on:
      - mosquitto

  backend:
    build: .
    command: node index.js
    ports:
      - "3000:3000"
    environment:
      - MQTT_URL=mqtt://mosquitto:1883
      - ALERTA_URL=http://alerta-mock:8080/api/alerts
      - ALERTA_KEY=DUMMY_KEY
    depends_on:
      - mosquitto
      - alerta-mock
